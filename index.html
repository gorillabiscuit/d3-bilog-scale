<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Piecewise Scale — D3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:                #1a1a2e;
      --surface:           #16213e;
      --border:            #2a2a5a;
      --text:              #e0e0f0;
      --text-muted:        #a0a0c0;
      --text-faint:        #6060a0;
      --accent:            #7070ff;

      --dot-fill:          #7070ff;
      --axis-color:        #3a3a6a;
      --axis-text:         #a0a0c0;
      --label-color:       #6060a0;
      --tooltip-bg:        #0d1a33;
      --tooltip-border:    #3a3a6a;
      --tooltip-text:      #e0e0f0;
      --tooltip-text-muted:#a0a0c0;
      --ruler-tint:        #ffffff;
      --chart-surface:     #16213e;
    }
    [data-theme="light"] {
      --bg:                #f5f5fb;
      --surface:           #ffffff;
      --border:            #d0d0e8;
      --text:              #1a1a2e;
      --text-muted:        #5050a0;
      --text-faint:        #9090b0;
      --accent:            #4040cc;

      --dot-fill:          #4040cc;
      --axis-color:        #c0c0d8;
      --axis-text:         #5050a0;
      --label-color:       #8080b0;
      --tooltip-bg:        #f0f0ff;
      --tooltip-border:    #c0c0d8;
      --tooltip-text:      #1a1a2e;
      --tooltip-text-muted:#5050a0;
      --ruler-tint:        #4040cc;
      --chart-surface:     #ffffff;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Chart card — single visual unit ────────────────────────────────── */
    .chart-card {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: background 0.2s, border-color 0.2s;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .chart-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1rem;
      height: 44px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      font-size: 0.8rem;
      color: var(--text-muted);
      transition: border-color 0.2s;
    }

    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
    }

    .toolbar-sep {
      width: 1px;
      height: 1.25em;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .toolbar-gap { flex: 1; min-width: 0.5rem; }

    label {
      font-size: 0.8rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    select, button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.8rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, border-color 0.2s, color 0.2s;
    }
    button:hover { background: var(--border); }

    .chart-toolbar input[type="range"] {
      width: 160px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .alpha-readout {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 3ch;
    }

    #window-range {
      color: var(--accent);
      font-size: 0.78em;
      min-width: 10em;
      display: inline-block;
    }

    #status {
      font-size: 0.78rem;
      color: var(--text-faint);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 220px;
    }

    /* ── Chart area ──────────────────────────────────────────────────────── */
    #chart-adaptive {
      flex: 1;
      min-height: 0;
    }
  </style>
</head>
<body>
  <div class="chart-card">
    <div class="chart-toolbar">
      <span class="chart-title">Adaptive Piecewise Scale</span>

      <div class="toolbar-sep"></div>

      <label for="dataset-selector">Dataset</label>
      <select id="dataset-selector">
        <option value="usgs">USGS Earthquakes — magnitude / depth</option>
        <option value="nyc" selected>NYC Property Sales — sale price / price per sq ft</option>
        <option value="sba">SBA 7(a) Loans — loan amount / term</option>
        <option value="forbes">Forbes Global 2000 — revenue / profit</option>
        <option value="openalex">OpenAlex Citations — citation count / year</option>
      </select>

      <div class="toolbar-sep"></div>

      <label for="alpha-slider">Window</label>
      <input type="range" id="alpha-slider" min="0" max="1" step="any" value="0.5">
      <span class="alpha-readout" id="alpha-value">0.50</span>
      <span id="window-range"></span>

      <div class="toolbar-gap"></div>

      <span id="status"></span>
      <button id="theme-toggle">☀ Light</button>
    </div>

    <div id="chart-adaptive" class="chart-container"></div>
  </div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
