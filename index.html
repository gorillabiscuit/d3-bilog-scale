<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Piecewise Scale — D3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    label {
      font-size: 0.875rem;
      color: #a0a0c0;
    }

    select {
      background: #16213e;
      color: #e0e0f0;
      border: 1px solid #2a2a5a;
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #status {
      font-size: 0.8rem;
      color: #6060a0;
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    .charts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    .chart-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .chart-wrapper h2 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #8080b0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .chart-container {
      width: 100%;
      height: 190px;
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-radius: 6px;
    }

    .chart-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: #a0a0c0;
    }

    .chart-controls input[type="range"] {
      width: 200px;
      accent-color: #7070ff;
      cursor: pointer;
    }

    .alpha-readout {
      font-variant-numeric: tabular-nums;
      color: #e0e0f0;
      min-width: 3ch;
    }
  </style>
</head>
<body>
  <header>
    <h1>Adaptive Piecewise Scale</h1>
    <label for="dataset-selector">Dataset:</label>
    <select id="dataset-selector">
      <option value="usgs">USGS Earthquakes — magnitude / depth</option>
      <option value="nyc" selected>NYC Property Sales — sale price / price per sq ft</option>
      <option value="sba">SBA 7(a) Loans — loan amount / term</option>
      <option value="forbes">Forbes Global 2000 — revenue / profit</option>
      <option value="openalex">OpenAlex Citations — citation count / year</option>
    </select>
    <span id="status"></span>
  </header>

  <div class="charts">
    <div class="chart-wrapper">
      <h2>Linear scale</h2>
      <div id="chart-linear" class="chart-container"></div>
    </div>
    <div class="chart-wrapper">
      <h2>Log scale</h2>
      <div id="chart-log" class="chart-container"></div>
    </div>
    <div class="chart-wrapper">
      <h2>Experimental — power scale</h2>
      <div class="chart-controls">
        <label for="scale-mode">Scale</label>
        <select id="scale-mode">
          <option value="piecewise">Piecewise (linear + tails)</option>
          <option value="log">Log</option>
        </select>
        <label for="window-method" id="window-method-label" style="margin-left:0.75rem">Window</label>
        <select id="window-method">
          <option value="quantile">Quantile</option>
          <option value="kde">KDE</option>
          <option value="mixture">Mixture model</option>
        </select>
        <label for="alpha-slider" style="margin-left:0.75rem">Tightness</label>
        <input type="range" id="alpha-slider" min="0" max="1" step="any" value="0.5">
        <span class="alpha-readout" id="alpha-value">0.50</span>
        <span id="window-range" style="color:#8888cc;font-size:0.8em;min-width:10em;display:inline-block"></span>
        <span id="slider-hint" style="color:#6060a0">← narrower &nbsp;|&nbsp; wider →</span>
      </div>
      <div id="chart-adaptive" class="chart-container"></div>
    </div>
  </div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
