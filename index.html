<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Piecewise Scale — D3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #e0e0f0;
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      padding: 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-shrink: 0;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    label {
      font-size: 0.875rem;
      color: #a0a0c0;
    }

    select {
      background: #16213e;
      color: #e0e0f0;
      border: 1px solid #2a2a5a;
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    #status {
      font-size: 0.8rem;
      color: #6060a0;
      margin-left: auto;
    }

    .charts {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }

    .chart-wrapper {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .chart-wrapper h2 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #8080b0;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .chart-container {
      width: 100%;
      height: 260px;
      background: #16213e;
      border: 1px solid #2a2a5a;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Adaptive Piecewise Scale</h1>
    <label for="dataset-selector">Dataset:</label>
    <select id="dataset-selector">
      <option value="usgs">USGS Earthquakes — magnitude / depth</option>
      <option value="nyc">NYC Property Sales — sale price / sq ft</option>
      <option value="sba">SBA 7(a) Loans — loan amount / term</option>
      <option value="forbes">Forbes Global 2000 — revenue / profit</option>
      <option value="openalex">OpenAlex Citations — citation count / year</option>
    </select>
    <label for="method-selector">Breakpoints:</label>
    <select id="method-selector">
      <option value="iqr">IQR (Tukey fences)</option>
      <option value="log-iqr">Log-IQR (IQR in log space)</option>
      <option value="percentile">Percentile (P10 / P90)</option>
    </select>
    <span id="status"></span>
  </header>

  <div class="charts">
    <div class="chart-wrapper">
      <h2>Linear scale</h2>
      <div id="chart-linear" class="chart-container"></div>
    </div>
    <div class="chart-wrapper">
      <h2>Log scale</h2>
      <div id="chart-log" class="chart-container"></div>
    </div>
    <div class="chart-wrapper">
      <h2>Adaptive piecewise scale</h2>
      <div id="chart-adaptive" class="chart-container"></div>
    </div>
  </div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
