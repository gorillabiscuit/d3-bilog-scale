<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adaptive Piecewise Scale — D3</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Theme tokens ──────────────────────────────────────────────────── */
    :root {
      --bg:          #1a1a2e;
      --surface:     #16213e;
      --border:      #2a2a5a;
      --text:        #e0e0f0;
      --text-muted:  #a0a0c0;
      --text-faint:  #6060a0;
      --accent:      #7070ff;
    }
    [data-theme="light"] {
      --bg:          #f5f5fb;
      --surface:     #ffffff;
      --border:      #d0d0e8;
      --text:        #1a1a2e;
      --text-muted:  #5050a0;
      --text-faint:  #9090b0;
      --accent:      #4040cc;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      padding: 1.5rem;
      transition: background 0.2s, color 0.2s;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-shrink: 0;
      overflow: hidden;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    select, button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.6rem;
      font-size: 0.875rem;
      cursor: pointer;
    }

    button {
      padding: 0.3rem 0.75rem;
      font-size: 0.8rem;
      transition: background 0.15s;
    }
    button:hover { background: var(--border); }

    #status {
      font-size: 0.8rem;
      color: var(--text-faint);
      margin-left: auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 280px;
    }

    /* ── Controls row ──────────────────────────────────────────────────── */
    .chart-controls {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .chart-controls input[type="range"] {
      width: 200px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .alpha-readout {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 3ch;
    }

    /* ── Settings panel ────────────────────────────────────────────────── */
    .settings-panel {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-shrink: 0;
      padding: 0.5rem 0.75rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .settings-panel label { font-size: 0.8rem; }

    .settings-panel input[type="range"] {
      width: 100px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .settings-panel select {
      padding: 0.15rem 0.4rem;
      font-size: 0.8rem;
    }

    .settings-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .settings-readout {
      font-variant-numeric: tabular-nums;
      color: var(--text);
      min-width: 3ch;
    }

    /* ── Toggle switch ─────────────────────────────────────────────────── */
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 30px;
      height: 17px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.15s;
    }
    .toggle-track::before {
      content: '';
      position: absolute;
      width: 11px; height: 11px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    .toggle-switch input:checked + .toggle-track { background: var(--accent); }
    .toggle-switch input:checked + .toggle-track::before { transform: translateX(13px); }

    /* ── Chart ─────────────────────────────────────────────────────────── */
    #chart-adaptive {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: background 0.2s, border-color 0.2s;
    }
  </style>
</head>
<body>
  <header>
    <h1>Adaptive Piecewise Scale</h1>
    <label for="dataset-selector">Dataset:</label>
    <select id="dataset-selector">
      <option value="usgs">USGS Earthquakes — magnitude / depth</option>
      <option value="nyc" selected>NYC Property Sales — sale price / price per sq ft</option>
      <option value="sba">SBA 7(a) Loans — loan amount / term</option>
      <option value="forbes">Forbes Global 2000 — revenue / profit</option>
      <option value="openalex">OpenAlex Citations — citation count / year</option>
    </select>
    <button id="theme-toggle">☀ Light</button>
    <span id="status"></span>
  </header>

  <div style="display:none">
    <div id="chart-linear"></div>
    <div id="chart-log"></div>
  </div>

  <div class="chart-controls">
    <label for="alpha-slider">Tightness</label>
    <input type="range" id="alpha-slider" min="0" max="1" step="any" value="0.5">
    <span class="alpha-readout" id="alpha-value">0.50</span>
    <span id="window-range" style="color:var(--accent);font-size:0.8em;min-width:10em;display:inline-block"></span>
    <span id="slider-hint" style="color:var(--text-faint)">← narrower &nbsp;|&nbsp; wider →</span>
  </div>

  <div class="settings-panel">
    <span style="color:var(--text-faint);font-weight:500;letter-spacing:0.05em;font-size:0.75rem;text-transform:uppercase">Chart settings</span>

    <div class="settings-group">
      <label for="dot-size">Dot size</label>
      <select id="dot-size">
        <option value="auto">Auto</option>
        <option value="2">Small (2px)</option>
        <option value="3">Medium (3px)</option>
        <option value="5">Large (5px)</option>
      </select>
    </div>

    <div class="settings-group">
      <label for="dot-opacity">Opacity</label>
      <input type="range" id="dot-opacity" min="0" max="1" step="0.05" value="0">
      <span class="settings-readout" id="dot-opacity-value">auto</span>
    </div>

    <div class="settings-group">
      <label for="tail-ticks">Tail lines</label>
      <label class="toggle-switch">
        <input type="checkbox" id="tail-ticks" checked>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>

  <div id="chart-adaptive" class="chart-container" style="flex:1;min-height:0"></div>

  <script type="module" src="/src/index.js"></script>
</body>
</html>
